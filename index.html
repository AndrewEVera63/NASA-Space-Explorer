<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="loadImages">Get Space Images</button>
    </div>
<div id="spaceFact" class="space-fact"></div>
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <div id="imageModal" class="modal">
  <div class="modal-content">

    <span id="closeModal">&times;</span>

   <div class="video-container">

    <img id="modalImage" alt="NASA Image">

    <a id="videoLink" class="video-overlay" target="_blank" style="display:none;">
        <div class="play-button">▶</div>
    </a>

</div>

    <h2 id="modalTitle"></h2>

    <p id="modalDate"></p>

    <p id="modalDescription"></p>

  </div>
</div>
  </div>



  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
